version: "3.8"

services:
  # ═══════════════════════════════════════════
  #  SUPABASE — Base de données + API + Auth
  # ═══════════════════════════════════════════

  db:
    image: public.ecr.aws/supabase/postgres:17.6.1.139
    container_name: ordergenie-db
    healthcheck:
      test: pg_isready -U postgres -d postgres
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "54322:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

  auth:
    image: public.ecr.aws/supabase/gotrue:v2.191.0
    container_name: ordergenie-auth
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_SITE_URL: http://localhost:8080
      GOTRUE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      GOTRUE_LOG_LEVEL: warn

  rest:
    image: public.ecr.aws/supabase/postgrest:v14.13
    container_name: ordergenie-rest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "54321:3000"
    environment:
      PGRST_DB_URI: postgresql://postgres:postgres@db:5432/postgres
      PGRST_DB_SCHEMA: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_OPENAPI_SERVER_PROXY_URI: http://127.0.0.1:54321

  realtime:
    image: public.ecr.aws/supabase/realtime:v2.108.0
    container_name: ordergenie-realtime
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_ENC_KEY: supersecretrealtimeencryptionkey1234567890123456
      JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      REPLICATION_MODE: RLS

  storage:
    image: public.ecr.aws/supabase/storage-api:v1.61.3
    container_name: ordergenie-storage
    depends_on:
      db:
        condition: service_healthy
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      REGION: local
      GLOBAL_S3_BUCKET: company-assets
      STORAGE_BACKEND: file
      FILE_SIZE_LIMIT: 52428800

  # ═══════════════════════════════════════════
  #  ORDERGENIESOLUTION — L'application
  # ═══════════════════════════════════════════

  app:
    image: node:24-alpine
    container_name: ordergenie-app
    ports:
      - "8080:8080"
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        npm install --legacy-peer-deps &&
        npm run dev -- --host 0.0.0.0
      "
    environment:
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0

volumes:
  db-data:
